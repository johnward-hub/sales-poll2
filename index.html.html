<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Team Poll</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Source+Code+Pro:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --slack-purple: #4A154B;
    --slack-green: #2BAC76;
    --slack-yellow: #ECB22E;
    --slack-red: #E01E5A;
    --slack-blue: #36C5F0;
    --bg: #1A1D21;
    --surface: #222529;
    --surface2: #2D3136;
    --border: #3D4046;
    --text: #D1D2D3;
    --text-muted: #7B7E82;
    --text-bright: #FFFFFF;
    --accent: #611f69;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 60px;
  }

  /* Top bar */
  .topbar {
    width: 100%;
    max-width: 680px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 18px 0 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .topbar .channel-icon {
    font-size: 20px;
    color: var(--text-muted);
    font-weight: 900;
  }
  .topbar .channel-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-bright);
  }
  .topbar .channel-desc {
    font-size: 13px;
    color: var(--text-muted);
    margin-left: 4px;
  }

  /* Message bubble */
  .message {
    width: 100%;
    max-width: 680px;
    display: flex;
    gap: 12px;
    margin-bottom: 4px;
  }
  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    background: linear-gradient(135deg, #4A154B, #611f69);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg-body { flex: 1; }
  .msg-meta {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
  }
  .msg-author {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-bright);
  }
  .msg-app-badge {
    font-size: 10px;
    background: var(--surface2);
    color: var(--text-muted);
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .msg-time {
    font-size: 11px;
    color: var(--text-muted);
  }

  /* Poll card */
  .poll-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--slack-green);
    border-radius: 8px;
    padding: 16px 18px;
    margin-top: 2px;
  }

  .poll-question {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-bright);
    margin-bottom: 6px;
    line-height: 1.4;
  }
  .poll-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .poll-meta .dot { opacity: 0.4; }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }

  .option {
    position: relative;
    cursor: pointer;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface2);
    transition: border-color 0.15s, transform 0.1s;
    user-select: none;
  }
  .option:hover { border-color: var(--slack-green); transform: translateX(2px); }
  .option.voted { border-color: var(--slack-green); }
  .option.voted .bar { background: rgba(43,172,118,0.18); }

  .bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: rgba(43,172,118,0.08);
    border-radius: 5px 0 0 5px;
    transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }

  .option-inner {
    position: relative;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    z-index: 1;
  }
  .option-label {
    flex: 1;
    font-size: 14px;
    font-weight: 700;
    color: var(--text-bright);
    font-family: 'Source Code Pro', monospace;
  }
  .option-count {
    font-size: 13px;
    color: var(--text-muted);
    min-width: 28px;
    text-align: right;
    font-family: 'Source Code Pro', monospace;
  }
  .option-pct {
    font-size: 11px;
    color: var(--slack-green);
    min-width: 34px;
    text-align: right;
    font-family: 'Source Code Pro', monospace;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .voted-state .option-pct { opacity: 1; }

  .check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 10px;
  }
  .option.voted .check {
    background: var(--slack-green);
    border-color: var(--slack-green);
    color: #fff;
  }

  /* Voters avatars */
  .voters {
    display: flex;
    gap: -4px;
    margin-top: 5px;
    flex-wrap: wrap;
    gap: 3px;
    min-height: 20px;
  }
  .voter-chip {
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg);
    border-radius: 10px;
    padding: 1px 7px;
    border: 1px solid var(--border);
    cursor: default;
    transition: color 0.2s;
  }
  .voter-chip:hover { color: var(--text-bright); }

  /* Footer actions */
  .poll-footer {
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
    flex-wrap: wrap;
  }
  .total-votes {
    font-size: 12px;
    color: var(--text-muted);
    flex: 1;
  }
  .total-votes strong { color: var(--slack-green); }

  .btn {
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text-bright); }
  .btn-primary {
    background: var(--slack-green);
    color: #fff;
  }
  .btn-primary:hover { background: #239962; transform: translateY(-1px); }
  .btn-danger {
    background: transparent;
    color: var(--slack-red);
    border: 1px solid var(--border);
  }
  .btn-danger:hover { background: rgba(224,30,90,0.1); }

  /* Admin panel */
  .admin-panel {
    width: 100%;
    max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    margin-bottom: 20px;
  }
  .admin-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .admin-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .admin-label {
    font-size: 12px;
    color: var(--text-muted);
    min-width: 80px;
  }
  .admin-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-bright);
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
    transition: border-color 0.15s;
    min-width: 120px;
  }
  .admin-input:focus { border-color: var(--slack-green); }

  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 700;
  }
  .tag-live { background: rgba(43,172,118,0.15); color: var(--slack-green); }
  .tag-closed { background: rgba(123,126,130,0.15); color: var(--text-muted); }

  /* Results summary */
  .results-summary {
    width: 100%;
    max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    margin-top: 16px;
    display: none;
  }
  .results-summary.visible { display: block; }
  .results-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-bright);
    margin-bottom: 12px;
  }
  .results-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .results-row:last-child { border-bottom: none; }
  .results-name { color: var(--text); }
  .results-val {
    font-family: 'Source Code Pro', monospace;
    font-weight: 700;
    color: var(--slack-green);
  }
  .total-line {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 2px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-weight: 700;
    font-size: 14px;
    color: var(--text-bright);
  }
  .total-line span { color: var(--slack-yellow); font-family: 'Source Code Pro', monospace; }

  /* Vote name modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    width: 340px;
    animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal h3 { font-size: 16px; color: var(--text-bright); margin-bottom: 6px; }
  .modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
  .modal .admin-input { width: 100%; margin-bottom: 12px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    font-size: 13px;
    color: var(--text-bright);
    z-index: 200;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .divider { width: 100%; max-width: 680px; border: none; border-top: 1px solid var(--border); margin: 4px 0 20px; }
</style>
</head>
<body>

<!-- Channel header -->
<div class="topbar">
  <span class="channel-icon">#</span>
  <span class="channel-name">sales-team</span>
  <span class="channel-desc">· Daily closes poll</span>
</div>

<!-- Admin Controls -->
<div class="admin-panel">
  <div class="admin-title">⚙ Poll Admin <span class="tag tag-live" id="poll-status-tag">LIVE</span></div>
  <div class="admin-row">
    <span class="admin-label">Question</span>
    <input class="admin-input" id="admin-question" value="How many closes will you get today?" />
  </div>
  <div class="admin-row">
    <span class="admin-label">Options</span>
    <input class="admin-input" id="admin-options" value="0, 1, 2, 3, 4, 5+" placeholder="Comma-separated options" />
  </div>
  <div class="admin-row" style="gap:8px; margin-bottom:0; margin-top:4px;">
    <button class="btn btn-primary" onclick="updatePoll()">↺ Update Poll</button>
    <button class="btn btn-ghost" onclick="resetPoll()">Reset Votes</button>
    <button class="btn btn-danger" onclick="closePoll()">Close Poll</button>
  </div>
</div>

<!-- Slack message -->
<div class="message">
  <div class="avatar">📊</div>
  <div class="msg-body">
    <div class="msg-meta">
      <span class="msg-author">Simple Poll</span>
      <span class="msg-app-badge">App</span>
      <span class="msg-time" id="poll-time"></span>
    </div>

    <div class="poll-card" id="poll-card">
      <div class="poll-question" id="poll-question">How many closes will you get today?</div>
      <div class="poll-meta">
        <span id="vote-count-meta">0 votes</span>
        <span class="dot">·</span>
        <span id="poll-open-label">Open until end of day</span>
      </div>

      <div class="options voted-state" id="options-container"></div>

      <div class="poll-footer">
        <div class="total-votes" id="footer-votes">No votes yet</div>
        <button class="btn btn-ghost" onclick="openVoteModal()">Vote</button>
      </div>
    </div>
  </div>
</div>

<hr class="divider">

<!-- Results Summary -->
<div class="results-summary" id="results-summary">
  <div class="results-title">📋 Today's Forecast — Individual Responses</div>
  <div id="results-list"></div>
  <div class="total-line">Total projected closes <span id="total-closes">0</span></div>
</div>

<!-- Vote Modal -->
<div class="modal-overlay" id="vote-modal">
  <div class="modal">
    <h3>Cast Your Vote</h3>
    <p>Enter your name and pick your closes for today.</p>
    <input class="admin-input" id="voter-name" placeholder="Your name (e.g. Sarah M.)" />
    <div id="modal-options" style="display:flex; flex-direction:column; gap:6px; margin-bottom:14px;"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitVote()">Submit Vote</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // State
  let state = {
    question: "How many closes will you get today?",
    options: ["0","1","2","3","4","5+"],
    votes: {}, // { "Sarah M.": "3" }
    open: true
  };

  let pendingVoteOption = null;

  function init() {
    document.getElementById('poll-time').textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    renderPoll();
  }

  function getOptionTotals() {
    const totals = {};
    state.options.forEach(o => totals[o] = 0);
    Object.values(state.votes).forEach(v => { if (totals[v] !== undefined) totals[v]++; });
    return totals;
  }

  function getTotalVotes() { return Object.keys(state.votes).length; }

  function renderPoll() {
    document.getElementById('poll-question').textContent = state.question;
    const totals = getOptionTotals();
    const total = getTotalVotes();
    const container = document.getElementById('options-container');
    container.innerHTML = '';

    state.options.forEach(opt => {
      const count = totals[opt] || 0;
      const pct = total > 0 ? Math.round((count / total) * 100) : 0;
      const voters = Object.entries(state.votes).filter(([,v]) => v === opt).map(([n]) => n);

      const div = document.createElement('div');
      div.className = 'option' + (false ? ' voted' : '');
      div.onclick = () => { if (state.open) openVoteModal(opt); };

      div.innerHTML = `
        <div class="bar" style="width: ${pct}%"></div>
        <div class="option-inner">
          <div class="check">${count > 0 ? '✓' : ''}</div>
          <div class="option-label">${opt} close${opt === '1' ? '' : 's'}</div>
          <div class="option-count">${count > 0 ? count + ' vote' + (count>1?'s':'') : ''}</div>
          <div class="option-pct">${total > 0 ? pct + '%' : ''}</div>
        </div>
        ${voters.length > 0 ? `<div class="voters">${voters.map(v => `<span class="voter-chip">${v}</span>`).join('')}</div><div style="height:6px"></div>` : ''}
      `;
      if (count > 0) div.classList.add('voted');
      container.appendChild(div);
    });

    const meta = total === 0 ? 'No votes yet' : `${total} vote${total!==1?'s':''} · ${Object.keys(state.votes).join(', ')}`;
    document.getElementById('vote-count-meta').textContent = `${total} vote${total!==1?'s':''}`;
    document.getElementById('footer-votes').innerHTML = total > 0
      ? `<strong>${total}</strong> team member${total!==1?'s have':' has'} voted`
      : 'No votes yet';

    renderResults();
  }

  function renderResults() {
    const summary = document.getElementById('results-summary');
    const list = document.getElementById('results-list');
    const total = getTotalVotes();
    if (total === 0) { summary.classList.remove('visible'); return; }
    summary.classList.add('visible');

    // Numeric total of closes
    let closes = 0;
    Object.values(state.votes).forEach(v => {
      const n = v === '5+' ? 5 : parseInt(v);
      if (!isNaN(n)) closes += n;
    });

    list.innerHTML = Object.entries(state.votes)
      .sort((a,b) => {
        const av = a[1]==='5+'?5:parseInt(a[1]);
        const bv = b[1]==='5+'?5:parseInt(b[1]);
        return bv - av;
      })
      .map(([name, val]) => `
        <div class="results-row">
          <span class="results-name">👤 ${name}</span>
          <span class="results-val">${val} close${val==='1'?'':'s'}</span>
        </div>
      `).join('');

    document.getElementById('total-closes').textContent = closes + (Object.values(state.votes).includes('5+') ? '+' : '');
  }

  function openVoteModal(preselect) {
    if (!state.open) { showToast('This poll is closed.'); return; }
    pendingVoteOption = preselect || null;

    const optContainer = document.getElementById('modal-options');
    optContainer.innerHTML = state.options.map(opt => `
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);transition:border-color 0.15s;"
        onmouseover="this.style.borderColor='var(--slack-green)'" onmouseout="this.style.borderColor=pendingVoteOption==='${opt}'?'var(--slack-green)':'var(--border)'">
        <input type="radio" name="modal-vote" value="${opt}" ${preselect===opt?'checked':''} style="accent-color:var(--slack-green);"
          onchange="pendingVoteOption='${opt}'; document.querySelectorAll('#modal-options label').forEach(l=>l.style.borderColor='var(--border)'); this.closest('label').style.borderColor='var(--slack-green)'">
        <span style="font-family:'Source Code Pro',monospace;font-weight:700;font-size:14px;color:var(--text-bright)">${opt} close${opt==='1'?'':'s'}</span>
      </label>
    `).join('');

    document.getElementById('vote-modal').classList.add('open');
    setTimeout(() => document.getElementById('voter-name').focus(), 100);
  }

  function closeModal() {
    document.getElementById('vote-modal').classList.remove('open');
    pendingVoteOption = null;
  }

  function submitVote() {
    const name = document.getElementById('voter-name').value.trim();
    const selected = document.querySelector('input[name="modal-vote"]:checked');
    if (!name) { showToast('Please enter your name!'); return; }
    if (!selected) { showToast('Please pick an option!'); return; }

    const prev = state.votes[name];
    state.votes[name] = selected.value;
    closeModal();
    renderPoll();
    showToast(prev ? `Updated: ${name} → ${selected.value} closes` : `Voted! ${name} → ${selected.value} closes`);
    document.getElementById('voter-name').value = '';
  }

  function updatePoll() {
    const q = document.getElementById('admin-question').value.trim();
    const opts = document.getElementById('admin-options').value.split(',').map(s=>s.trim()).filter(Boolean);
    if (!q || opts.length < 2) { showToast('Need a question and at least 2 options.'); return; }
    state.question = q;
    state.options = opts;
    state.votes = {};
    state.open = true;
    document.getElementById('poll-status-tag').textContent = 'LIVE';
    document.getElementById('poll-status-tag').className = 'tag tag-live';
    document.getElementById('poll-open-label').textContent = 'Open until end of day';
    renderPoll();
    showToast('Poll updated!');
  }

  function resetPoll() {
    if (!confirm('Clear all votes?')) return;
    state.votes = {};
    renderPoll();
    showToast('Votes cleared.');
  }

  function closePoll() {
    if (!state.open) { state.open = true; document.getElementById('poll-status-tag').textContent='LIVE'; document.getElementById('poll-status-tag').className='tag tag-live'; document.getElementById('poll-open-label').textContent='Open until end of day'; showToast('Poll reopened.'); return; }
    state.open = false;
    document.getElementById('poll-status-tag').textContent = 'CLOSED';
    document.getElementById('poll-status-tag').className = 'tag tag-closed';
    document.getElementById('poll-open-label').textContent = 'Poll closed';
    showToast('Poll closed. Click again to reopen.');
    renderPoll();
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // Close modal on overlay click
  document.getElementById('vote-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

  // Enter to submit
  document.getElementById('voter-name').addEventListener('keydown', e => { if (e.key === 'Enter') submitVote(); });

  init();
</script>
</body>
</html>
